<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patreon Code</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
   <div class="container">
    <h2>Patreon Login Successful!</h2>

    <p>Copy the code below and paste it into the app:</p>

    <input type="text" id="patreonCode" style="width: 100%;" readonly>

    <div class="button-group">
      <button id="copyButton">Copy to Clipboard</button>
      <button onclick="alert('Copy the code from the URL manually if empty')">Get Code</button>
    </div>
  </div>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      const codeInput = document.getElementById("patreonCode");
      codeInput.value = code;

      document.getElementById("copyButton").addEventListener("click", () => {
        navigator.clipboard.writeText(codeInput.value)
          .then(() => alert("Patreon code copied! Paste it in the app."))
          .catch(() => alert("Failed to copy code. Try manually."));
      });

    } else {
      document.body.innerHTML = '<div class="container"><div class="error-message">No Patreon code received.</div></div>';
    }
  </script>
</body>
</html>
